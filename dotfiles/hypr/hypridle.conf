general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    # before_sleep_cmd = loginctl lock-session    # lock before suspend.
    # after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}


listener {
    timeout = 10800                                                    # in seconds || 3 hours
    on-timeout =  hyprctl dispatch 'hl.dsp.dpms({action = "off", monitor = "current"})' && sleep 0.5 && hyprlock   # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action = "on", monitor = "current"})'    # screen on when activity is detected after timeout has fired.
    
    ignore_inhibit = false
}
